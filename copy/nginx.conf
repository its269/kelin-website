# Nginx configuration for Kelin Graphics System Website
# This configuration is optimized for Next.js static site

upstream nextjs_upstream {
    server 127.0.0.1:3000;
    # If you have multiple instances, add more servers here
    # server 127.0.0.1:3001;
    keepalive 64;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name kelinph.com www.kelinph.com;

    # Allow Let's Encrypt ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name kelinph.com www.kelinph.com;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/kelinph.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kelinph.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' https: data: blob:;" always;

    # Root directory
    root /var/www/kelin-website/out;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss image/svg+xml;

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Next.js static files
    location /_next/static/ {
        alias /var/www/kelin-website/out/_next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Images
    location /images/ {
        alias /var/www/kelin-website/out/images/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";
        access_log off;
    }

    # Public folder assets
    location ~* ^/(KELIN-LOGO-01\.png|robots\.txt|sitemap\.xml|favicon\.ico)$ {
        root /var/www/kelin-website/out;
        expires 1d;
        add_header Cache-Control "public";
    }

    # Handle all routes - Next.js static export
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Custom 404 page
    error_page 404 /404.html;
    location = /404.html {
        root /var/www/kelin-website/out;
        internal;
    }

    # Logs
    access_log /var/log/nginx/kelin-access.log;
    error_log /var/log/nginx/kelin-error.log;

    # Client body size limit
    client_max_body_size 10M;
}

